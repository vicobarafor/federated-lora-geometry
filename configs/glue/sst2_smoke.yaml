experiment_name: sst2_smoke
output_root: results/raw

model:
  name: distilbert-base-uncased
  freeze_backbone: true

task:
  name: sst2
  num_labels: 2

data:
  max_length: 128
  num_clients: 4
  train_subset_per_client: 200
  eval_subset: 500

federation:
  num_rounds: 2
  clients_per_round: 2
  local_epochs: 1

optimization:
  lr: 5.0e-4
  batch_size: 8
  grad_accum_steps: 2
  weight_decay: 0.01

lora:
  r: 8
  alpha: 16
  dropout: 0.05
  target_modules: ["q_lin", "k_lin", "v_lin"]

runtime:
  seed: 42
  device: cuda
  fp16: true
  num_workers: 2
