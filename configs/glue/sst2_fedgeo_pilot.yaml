experiment_name: sst2_fedgeo_pilot
output_root: results/raw

model:
  name: distilbert-base-uncased
  freeze_backbone: true

task:
  name: sst2
  num_labels: 2

data:
  max_length: 128
  num_clients: 12
  train_subset_per_client: 400
  eval_subset: 872

federation:
  num_rounds: 10
  clients_per_round: 4
  local_epochs: 1

aggregation:
  name: fedgeo
  alpha_align: 1.0
  alpha_centroid: 1.0
  alpha_norm: 0.25
  temperature: 1.0

optimization:
  lr: 5.0e-4
  batch_size: 8
  grad_accum_steps: 2
  weight_decay: 0.01

lora:
  r: 8
  alpha: 16
  dropout: 0.05
  target_modules: ["q_lin", "k_lin", "v_lin"]

runtime:
  seed: 42
  device: cuda
  fp16: true
  num_workers: 2
